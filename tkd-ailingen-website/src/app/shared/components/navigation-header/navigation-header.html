<mat-toolbar class="navigation-header" color="primary" role="navigation">
  <div class="header-content">
    <!-- Logo/Club Name -->
    <div class="logo-link" 
         (click)="scrollToTop($event)"
         (keydown.enter)="scrollToTop($event)"
         (keydown.space)="scrollToTop($event)"
         role="button"
         tabindex="0"
         [attr.aria-label]="translationService.instant('nav.scrollToTop')">
      <span class="club-name">{{ translationService.instant('hero.clubName') }}</span>
    </div>

    <!-- Navigation Controls - Always visible (hamburger menu approach) -->
    <div class="mobile-controls">
      <!-- Language and Theme Toggle -->
      <app-language-toggle class="mobile-language-toggle" />
      <app-theme-toggle class="mobile-theme-toggle" />
      
      <!-- Hamburger Menu Button -->
      <button
        mat-icon-button
        class="mobile-menu-button"
        (click)="toggleMenu($event)"
        aria-label="Toggle navigation menu"
        type="button">
        <mat-icon>menu</mat-icon>
      </button>
    </div>
  </div>
</mat-toolbar>

<!-- Mobile Sidenav -->
<mat-sidenav-container class="sidenav-container" autosize>
  <mat-sidenav 
    #sidenav 
    mode="over" 
    position="end" 
    class="mobile-sidenav"
    [autoFocus]="false">
    <mat-nav-list>
      @for (item of navItems; track item.id) {
        <a
          mat-list-item
          (click)="onNavigationClick($event, item)"
          [class.active]="isActive(item)"
          role="button"
          tabindex="0">
          @if (item.icon) {
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          }
          <span matListItemTitle>{{ translationService.instant('nav.' + item.id) }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>
  
  <mat-sidenav-content>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
